name: Feature request
description: Propose a focused product improvement
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Explain the user problem before proposing an implementation. Large changes should preserve Opportune's local-first and approval-gated boundaries.

  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: What is difficult or impossible today, and who experiences it?
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the smallest useful behavior change.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What can users do today, and why is it insufficient?

  - type: dropdown
    id: boundary
    attributes:
      label: Does this add a new data or network boundary?
      options:
        - No
        - Yes, local data only
        - Yes, outbound network access
        - Yes, external write or hosted service
        - Unsure
    validations:
      required: true

  - type: textarea
    id: privacy
    attributes:
      label: Privacy and safety notes
      description: Explain any resume, credential, personal-data, automation, or external-action implications.

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing Issues and the roadmap.
          required: true
        - label: I have not included secrets or personal data.
          required: true
